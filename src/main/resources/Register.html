<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Register — PageTurn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="register.css">
</head>
<body>

<div class="card">
    <div class="card-header">
        <div class="logo">📚</div>
        <h1>Create Account</h1>
        <p>Join PageTurn Bookstore today</p>
    </div>

    <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Jane Austen"/>
    </div>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com"/>
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Choose a strong password"/>
    </div>

    <button class="btn-primary" onclick="register()">Create Account</button>

    <p class="switch-link">Already have an account? <a href="login.html">Sign In</a></p>

    <div id="message"></div>
</div>

<script src="register.js"></script>
</body>
</html>
