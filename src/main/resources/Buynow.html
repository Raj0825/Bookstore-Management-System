<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Buy Now — PageTurn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="buynow.css">
</head>
<body>
<nav>
    <a class="brand" href="homepage.html">📚 PageTurn</a>
    <div class="nav-links">
        <a href="homepage.html" class="nav-link">Browse</a>
        <a href="cart.html"     class="nav-link">🛒 Cart <span id="cart-count" class="badge"></span></a>
        <a href="wishlist.html" class="nav-link">♡ Wishlist</a>
        <a href="orders.html"   class="nav-link">📦 Orders</a>
        <a href="admin.html"    class="nav-link" id="admin-link" style="display:none">⚙ Admin</a>
    </div>
    <div class="nav-right">
        <span id="nav-email"></span>
        <button onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Buy Now</h1>
        <p>Direct purchase — no cart needed</p>
    </div>

    <div class="buynow-form">
        <h2>Order Details</h2>

        <div class="form-group">
            <label>Quantity</label>
            <input type="number" id="quantity" value="1" min="1"/>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Full Address</label>
                <input type="text" id="address" placeholder="Street, Area"/>
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" id="city" placeholder="Mumbai"/>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Pin Code</label>
                <input type="text" id="pin" placeholder="400001"/>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="phone" placeholder="9876543210"/>
            </div>
        </div>

        <div class="form-actions">
            <button class="btn-back" onclick="history.back()">← Go Back</button>
            <button class="btn-buy" onclick="confirmPurchase()">Confirm Purchase →</button>
        </div>

        <div id="message"></div>
    </div>
</div>

<script src="navbar.js"></script>
<script src="buynow.js"></script>
</body>
</html>
